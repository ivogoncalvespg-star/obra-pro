<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Obra Pro">
    <title>Obra Pro V10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/dropbox/dist/Dropbox-sdk.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; padding-top: env(safe-area-inset-top); }
        .tab-active { background: #2563eb !important; color: white !important; }
        input, select, textarea { font-size: 16px !important; } 
        .modal-overlay { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="h-screen overflow-hidden text-slate-900">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6" style="display: none;">
        <div class="text-center text-white max-w-sm">
            <div class="bg-blue-600 p-6 rounded-[32px] inline-block mb-6 shadow-2xl"><i data-lucide="wrench" size="48"></i></div>
            <h2 class="text-4xl font-black mb-2 uppercase italic tracking-tighter text-white">Obra Pro</h2>
            <p class="text-slate-400 mb-10 text-sm">Controlo de custos das moradias.<br>Ligue à sua Dropbox para começar.</p>
            <button onclick="doLogin()" class="w-full bg-blue-600 text-white py-5 rounded-[24px] font-black uppercase tracking-widest text-xs shadow-xl active:scale-95 transition-all">Ligar à Dropbox</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="flex h-full safe-bottom">
        <aside class="fixed bottom-0 left-0 right-0 h-20 bg-slate-900 text-white flex flex-row items-center justify-around px-4 z-50 md:relative md:w-64 md:h-full md:flex-col md:justify-start md:p-6 border-t md:border-t-0 border-slate-800">
            <div class="hidden md:flex items-center gap-3 mb-10 mt-4">
                <div class="bg-blue-600 p-2 rounded-xl"><i data-lucide="home" size="20"></i></div>
                <h1 class="text-xl font-black tracking-tighter italic">Obra<span class="text-blue-500">Pro</span></h1>
            </div>
            <button onclick="setView('dashboard')" id="btn-dashboard" class="flex flex-col md:flex-row items-center gap-1 md:gap-4 p-2 md:w-full md:p-4 rounded-2xl transition-all font-bold text-slate-400"><i data-lucide="layout-dashboard"></i> <span class="text-[10px] md:text-sm uppercase">Resumo</span></button>
            <button onclick="setView('entradas')" id="btn-entradas" class="flex flex-col md:flex-row items-center gap-1 md:gap-4 p-2 md:w-full md:p-4 rounded-2xl transition-all font-bold text-slate-400"><i data-lucide="arrow-down-left" class="text-emerald-500"></i> <span class="text-[10px] md:text-sm uppercase">Entradas</span></button>
            <button onclick="setView('despesas')" id="btn-despesas" class="flex flex-col md:flex-row items-center gap-1 md:gap-4 p-2 md:w-full md:p-4 rounded-2xl transition-all font-bold text-slate-400"><i data-lucide="arrow-up-right" class="text-red-400"></i> <span class="text-[10px] md:text-sm uppercase">Despesas</span></button>
            <button onclick="setView('review')" id="btn-review" class="flex flex-col md:flex-row items-center gap-1 md:gap-4 p-2 md:w-full md:p-4 rounded-2xl transition-all font-bold text-orange-400 relative"><i data-lucide="list-checks"></i> <span class="text-[10px] md:text-sm uppercase">Revisão</span><span id="review-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[8px] px-1.5 py-0.5 rounded-full hidden">0</span></button>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-slate-50">
            <header class="bg-white p-6 pt-12 md:pt-6 border-b flex justify-between items-center shadow-sm z-10">
                <h2 id="view-title" class="text-2xl font-black text-slate-800 uppercase tracking-tighter italic">Dashboard</h2>
                <div id="header-actions"></div>
            </header>
            <div id="content" class="p-4 md:p-8 overflow-y-auto h-full pb-32"></div>
        </main>
    </div>

    <!-- MODAL NOVO REGISTO -->
    <div id="modal-entry" style="display:none;" class="fixed inset-0 z-[60] modal-overlay flex items-end md:items-center justify-center">
        <div class="bg-white p-6 rounded-t-[32px] md:rounded-[32px] w-full max-w-lg shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6 md:hidden"></div>
            <h3 id="modal-title" class="text-xl font-black text-slate-800 text-center uppercase mb-6 italic">Novo Registo</h3>
            <div class="space-y-4">
                <div class="flex gap-2 bg-slate-100 p-1 rounded-2xl">
                    <button onclick="setEntryType('entrada')" id="type-entrada" class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase transition-all">Entrada</button>
                    <button onclick="setEntryType('despesa')" id="type-despesa" class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase transition-all">Despesa</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="form-date" class="bg-slate-50 border p-4 rounded-2xl">
                    <input type="number" id="form-value" placeholder="Valor €" class="bg-slate-50 border p-4 rounded-2xl font-bold">
                </div>
                <input type="text" id="form-desc" placeholder="Descrição" class="bg-slate-50 border p-4 rounded-2xl">
                <div id="box-category"><select id="form-cat" class="bg-slate-50 border p-4 rounded-2xl"></select></div>
                <div id="split-box" class="bg-blue-50 p-4 rounded-2xl space-y-3">
                    <p class="text-[9px] font-black text-blue-400 uppercase text-center mb-2">Imputação de Custo</p>
                    <div class="flex justify-between items-center"><span class="text-[10px] font-black uppercase">Moradia A</span><input type="number" id="split-A" class="w-24 text-right font-bold bg-transparent" placeholder="0"></div>
                    <div class="flex justify-between items-center"><span class="text-[10px] font-black uppercase text-emerald-600">Moradia B</span><input type="number" id="split-B" class="w-24 text-right font-bold bg-transparent" placeholder="0"></div>
                    <div class="flex justify-between items-center"><span class="text-[10px] font-black uppercase text-amber-600">Exterior</span><input type="number" id="split-EXT" class="w-24 text-right font-bold bg-transparent" placeholder="0"></div>
                </div>
                <button onclick="saveEntry()" class="w-full bg-blue-600 text-white py-5 rounded-[24px] font-black uppercase text-xs shadow-xl mt-4">Guardar Dados</button>
                <button onclick="closeModal()" class="w-full text-slate-400 font-bold py-2 text-[10px] uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = 'u4qws8pnz2r2asq'; 
        const REDIRECT_URI = 'https://ivogoncalvespg-star.github.io/obra-pro/';
        
        let db = { entradas: [], despesas: [], categorias: ['Terreno', 'Arquitectura', 'Licenças', 'Construção', 'Acabamentos', 'Extras'] };
        let currentView = 'dashboard';
        let tempType = 'despesa';
        let dbx = null;

        function getAccessTokenFromUrl() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            return params.get('access_token');
        }

        async function init() {
            const token = getAccessTokenFromUrl() || localStorage.getItem('dbx_token');
            if (token) {
                localStorage.setItem('dbx_token', token);
                window.location.hash = ""; 
                dbx = new Dropbox.Dropbox({ accessToken: token });
                loadData();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
            }
            lucide.createIcons();
        }

        function doLogin() {
            const authUrl = `https://www.dropbox.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
            window.location.href = authUrl;
        }

        async function loadData() {
            try {
                const response = await dbx.filesDownload({ path: '/obra_data.json' });
                const text = await response.result.fileBlob.text();
                db = JSON.parse(text);
                render();
            } catch (e) { saveData(); }
        }

        async function saveData() {
            try {
                await dbx.filesUpload({ path: '/obra_data.json', contents: JSON.stringify(db, null, 2), mode: 'overwrite' });
                render();
            } catch (e) { console.error(e); }
        }

        function setView(v) { currentView = v; render(); }

        function render() {
            document.getElementById('login-screen').style.display = 'none';
            const content = document.getElementById('content');
            const title = document.getElementById('view-title');
            document.querySelectorAll('aside button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + currentView).classList.add('tab-active');

            if (currentView === 'dashboard') {
                title.innerText = "Resumo";
                const totalE = db.entradas.reduce((a, b) => a + b.valor, 0);
                const totalD = db.despesas.reduce((a, b) => a + b.valor, 0);
                content.innerHTML = `
                    <div class="space-y-4">
                        <div class="bg-slate-900 text-white p-8 rounded-[32px] shadow-xl border-b-4 border-blue-600">
                            <p class="text-blue-400 text-[10px] font-black uppercase tracking-widest mb-1 italic">Saldo Disponível</p>
                            <h3 class="text-4xl font-black italic">${(totalE - totalD).toLocaleString('pt-PT', {minimumFractionDigits:2})}€</h3>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white p-6 rounded-[32px] border border-slate-200"><p class="text-slate-400 text-[9px] font-black uppercase mb-1">Total Recebido</p><p class="text-xl font-black text-emerald-600">${totalE.toLocaleString('pt-PT')}€</p></div>
                            <div class="bg-white p-6 rounded-[32px] border border-slate-200"><p class="text-slate-400 text-[9px] font-black uppercase mb-1">Total Pago</p><p class="text-xl font-black text-red-500">${totalD.toLocaleString('pt-PT')}€</p></div>
                        </div>
                    </div>`;
                document.getElementById('header-actions').innerHTML = `<button onclick="openModal()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg"><i data-lucide="plus"></i></button>`;
            }
            if (currentView === 'entradas') renderList(db.entradas, 'emerald');
            if (currentView === 'despesas') renderList(db.despesas, 'red');
            if (currentView === 'review') renderReview();
            
            const pending = db.despesas.filter(d => !d.split || (d.split.A + d.split.B + d.split.EXT === 0)).length;
            const badge = document.getElementById('review-count');
            if(pending > 0) { badge.innerText = pending; badge.style.display = 'block'; } else { badge.style.display = 'none'; }
            lucide.createIcons();
        }

        function renderList(list, color) {
            let html = '<div class="space-y-3">';
            list.sort((a,b) => new Date(b.data) - new Date(a.data)).forEach(item => {
                html += `<div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                    <div><p class="font-black text-xs uppercase italic">${item.desc}</p><p class="text-[9px] text-slate-400 font-bold uppercase">${item.data} ${item.cat ? '• '+item.cat : ''}</p></div>
                    <div class="text-right"><p class="font-black italic text-${color}-600">${item.valor.toLocaleString('pt-PT', {minimumFractionDigits:2})}€</p><button onclick="deleteEntry('${item.id}', '${item.cat ? 'despesa' : 'entrada'}')" class="text-[8px] font-black text-slate-300 uppercase">Eliminar</button></div>
                </div>`;
            });
            content.innerHTML = html + '</div>';
            document.getElementById('header-actions').innerHTML = `<button onclick="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-lg">Adicionar</button>`;
        }

        function renderReview() {
            const list = db.despesas.filter(d => !d.split || (d.split.A + d.split.B + d.split.EXT === 0));
            if(list.length === 0) { content.innerHTML = `<div class="py-20 text-center opacity-20 font-black uppercase italic">Tudo Imputado!</div>`; return; }
            let html = '<div class="space-y-6">';
            list.forEach(item => {
                html += `<div class="bg-white p-6 rounded-[32px] border border-orange-100 shadow-sm">
                    <div class="mb-4"><h4 class="font-black text-sm uppercase">${item.desc}</h4><p class="text-[10px] font-bold text-slate-400 uppercase">${item.valor.toFixed(2)}€ • ${item.data}</p></div>
                    <div class="grid grid-cols-3 gap-2">
                        <input type="number" id="rev-A-${item.id}" placeholder="A €" class="bg-slate-50 p-3 rounded-xl text-center font-bold text-xs">
                        <input type="number" id="rev-B-${item.id}" placeholder="B €" class="bg-slate-50 p-3 rounded-xl text-center font-bold text-xs">
                        <input type="number" id="rev-EXT-${item.id}" placeholder="EXT €" class="bg-slate-50 p-3 rounded-xl text-center font-bold text-xs">
                    </div>
                    <button onclick="saveImputation('${item.id}')" class="w-full mt-3 bg-slate-900 text-white py-3 rounded-xl font-black text-[10px] uppercase">Confirmar</button>
                </div>`;
            });
            content.innerHTML = html + '</div>';
        }

        function openModal() { document.getElementById('modal-entry').style.display = 'flex'; document.getElementById('form-cat').innerHTML = db.categorias.map(c => `<option value="${c}">${c}</option>`).join(''); document.getElementById('form-date').valueAsDate = new Date(); setEntryType('despesa'); }
        function closeModal() { document.getElementById('modal-entry').style.display = 'none'; }
        function setEntryType(t) { tempType = t; document.getElementById('type-entrada').className = t === 'entrada' ? 'flex-1 py-3 rounded-xl font-black text-[10px] uppercase bg-emerald-500 text-white shadow-lg' : 'flex-1 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400'; document.getElementById('type-despesa').className = t === 'despesa' ? 'flex-1 py-3 rounded-xl font-black text-[10px] uppercase bg-blue-600 text-white shadow-lg' : 'flex-1 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400'; document.getElementById('split-box').style.display = t === 'despesa' ? 'block' : 'none'; document.getElementById('box-category').style.display = t === 'despesa' ? 'block' : 'none'; }

        async function saveEntry() {
            const val = parseFloat(document.getElementById('form-value').value);
            const desc = document.getElementById('form-desc').value;
            if(!val || !desc) return alert("Erro nos dados!");
            const entry = { id: Date.now().toString(), data: document.getElementById('form-date').value, valor: val, desc, cat: tempType === 'despesa' ? document.getElementById('form-cat').value : null, split: tempType === 'despesa' ? { A: parseFloat(document.getElementById('split-A').value || 0), B: parseFloat(document.getElementById('split-B').value || 0), EXT: parseFloat(document.getElementById('split-EXT').value || 0) } : null };
            if (tempType === 'entrada') db.entradas.push(entry); else db.despesas.push(entry);
            closeModal(); await saveData();
        }

        async function saveImputation(id) {
            const item = db.despesas.find(d => d.id === id);
            const a = parseFloat(document.getElementById(`rev-A-${id}`).value || 0), b = parseFloat(document.getElementById(`rev-B-${id}`).value || 0), ext = parseFloat(document.getElementById(`rev-EXT-${id}`).value || 0);
            if(Math.abs((a+b+ext)-item.valor) > 0.1) return alert("Soma incorreta!");
            item.split = { A: a, B: b, EXT: ext };
            await saveData();
        }

        async function deleteEntry(id, type) { if(confirm("Eliminar?")) { if(type === 'entrada') db.entradas = db.entradas.filter(e => e.id !== id); else db.despesas = db.despesas.filter(d => d.id !== id); await saveData(); } }
        init();
    </script>
</body>
</html>
