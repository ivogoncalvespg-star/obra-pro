<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Obra Pro - V17 (Debug Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/dropbox/dist/Dropbox-sdk.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-active { background: #2563eb !important; color: white !important; }
        .status-bar { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="h-screen overflow-hidden text-slate-900">

    <!-- ECRÃ DE LOGIN -->
    <div id="login-screen" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6" style="display: none;">
        <div class="text-center text-white">
            <h2 class="text-4xl font-black mb-10 italic">OBRA PRO</h2>
            <button onclick="doLogin()" class="bg-white text-slate-900 px-10 py-5 rounded-2xl font-black uppercase">Ligar Dropbox</button>
        </div>
    </div>

    <div class="flex h-full">
        <!-- BARRA LATERAL -->
        <aside class="w-20 md:w-64 bg-slate-900 text-white flex flex-col p-4 border-r border-slate-800">
            <div class="mb-10 mt-4 flex justify-center md:justify-start gap-3">
                <div class="bg-blue-600 p-2 rounded-xl"><i data-lucide="wrench"></i></div>
                <h1 class="hidden md:block text-xl font-black italic">Obra<span class="text-blue-500">Pro</span></h1>
            </div>
            <nav class="space-y-4 flex-1">
                <button onclick="setView('dashboard')" id="btn-dashboard" class="w-full p-4 rounded-xl flex items-center justify-center md:justify-start gap-4 hover:bg-slate-800 transition-all">
                    <i data-lucide="layout-dashboard"></i> <span class="hidden md:block">Resumo</span>
                </button>
                <button onclick="setView('despesas')" id="btn-despesas" class="w-full p-4 rounded-xl flex items-center justify-center md:justify-start gap-4 hover:bg-slate-800 transition-all">
                    <i data-lucide="arrow-up-right" class="text-red-400"></i> <span class="hidden md:block">Despesas</span>
                </button>
                <button onclick="setView('entradas')" id="btn-entradas" class="w-full p-4 rounded-xl flex items-center justify-center md:justify-start gap-4 hover:bg-slate-800 transition-all">
                    <i data-lucide="arrow-down-left" class="text-emerald-500"></i> <span class="hidden md:block">Entradas</span>
                </button>
            </nav>
            <div id="sync-status" class="status-bar p-2 text-center text-slate-500">A Ligar...</div>
        </aside>

        <!-- CONTEÚDO -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white p-6 border-b flex justify-between items-center shadow-sm">
                <h2 id="view-title" class="text-2xl font-black uppercase italic">Dashboard</h2>
                <div id="header-actions"></div>
            </header>
            <div id="content" class="p-4 md:p-8 overflow-y-auto custom-scroll">
                <!-- Os dados aparecem aqui -->
            </div>
        </main>
    </div>

    <!-- MODAL NOVO REGISTO -->
    <div id="modal-entry" style="display:none;" class="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[32px] w-full max-w-lg shadow-2xl">
            <h3 class="text-xl font-black mb-6 uppercase italic text-blue-600">Novo Registo</h3>
            <div class="space-y-4">
                <input type="date" id="form-date" class="w-full p-4 border rounded-xl">
                <input type="number" id="form-value" placeholder="Valor (€)" class="w-full p-4 border rounded-xl">
                <input type="text" id="form-desc" placeholder="Descrição" class="w-full p-4 border rounded-xl">
                <select id="form-cat" class="w-full p-4 border rounded-xl"></select>
                <button onclick="saveEntry()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black uppercase">Guardar na Dropbox</button>
                <button onclick="closeModal()" class="w-full text-slate-400 font-bold py-2">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const APP_KEY = 'm258y65zq709vxu';
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        let dbx;
        let isInitialized = false;
        let db = { entradas: [], despesas: [], categorias: ["Terreno", "Arquitectura", "Licenças", "Construção", "Acabamentos", "Extras"] };
        let currentView = 'dashboard';
        let foundPath = '';

        // AUTENTICAÇÃO
        function doLogin() { 
            window.location.href = `https://www.dropbox.com/oauth2/authorize?client_id=${APP_KEY}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`; 
        }

        const token = new URLSearchParams(window.location.hash.substring(1)).get('access_token') || localStorage.getItem('dbx_token');
        if (token) {
            localStorage.setItem('dbx_token', token);
            window.location.hash = '';
            dbx = new Dropbox.Dropbox({ accessToken: token });
            initApp();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }

        async function initApp() {
            const status = document.getElementById('sync-status');
            status.innerText = "A PROCURAR FICHEIRO...";
            
            // Tentamos 3 caminhos possíveis
            const paths = ['/obra_data.json', '/Obra Pro/obra_data.json', '/Apps/ObraPro_Gestao_2026/obra_data.json'];
            
            for (let p of paths) {
                try {
                    const res = await dbx.filesDownload({ path: p });
                    const text = await res.result.fileBlob.text();
                    const data = JSON.parse(text);
                    
                    if (data.despesas && data.despesas.length > 0) {
                        db = data;
                        foundPath = p;
                        isInitialized = true;
                        status.innerText = "Sincronizado";
                        render();
                        console.log("Sucesso! Ficheiro lido de: " + p);
                        return;
                    }
                } catch (e) { console.log("Não existe em: " + p); }
            }

            // Se não encontrou ficheiro com dados
            status.innerText = "Vazio / Não encontrado";
            alert("Atenção: Não encontrei o seu ficheiro obra_data.json com dados na Dropbox. A aplicação está a iniciar a zeros. Se tem o ficheiro na Dropbox, mova-o para a raiz.");
            isInitialized = true;
            foundPath = '/obra_data.json';
            render();
        }

        async function saveToDropbox() {
            if (!isInitialized) return;
            document.getElementById('sync-status').innerText = "A GUARDAR...";
            try {
                await dbx.filesUpload({ path: foundPath, contents: JSON.stringify(db, null, 2), mode: 'overwrite' });
                document.getElementById('sync-status').innerText = "Sincronizado";
            } catch (err) {
                document.getElementById('sync-status').innerText = "Erro ao Gravar";
                alert("Erro ao gravar dados na Dropbox!");
            }
        }

        function setView(v) { currentView = v; render(); }

        function render() {
            const content = document.getElementById('content');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + currentView).classList.add('tab-active');

            const totalE = db.entradas.reduce((a, b) => a + (Number(b.valor) || 0), 0);
            const totalD = db.despesas.reduce((a, b) => a + (Number(b.valor) || 0), 0);

            if (currentView === 'dashboard') {
                content.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                        <div class="bg-slate-900 text-white p-10 rounded-[40px] shadow-xl">
                            <p class="text-slate-400 text-xs font-bold uppercase mb-2">Saldo em Conta</p>
                            <h3 class="text-4xl font-black text-blue-400 italic">${(totalE - totalD).toLocaleString('pt-PT')}€</h3>
                        </div>
                        <div class="bg-white p-10 rounded-[40px] border shadow-sm">
                            <p class="text-slate-400 text-xs font-bold uppercase mb-2">Investimento Total</p>
                            <h3 class="text-4xl font-black italic text-slate-800">${totalD.toLocaleString('pt-PT')}€</h3>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[32px] shadow-sm">
                        <h4 class="font-black mb-6 uppercase italic text-slate-500">Resumo por Categoria</h4>
                        <div class="space-y-4">
                            ${db.categorias.map(cat => {
                                const val = db.despesas.filter(d => d.cat === cat).reduce((a,b) => a + b.valor, 0);
                                return val > 0 ? `<div class="flex justify-between border-b pb-2"><span>${cat}</span><span class="font-black">${val.toLocaleString('pt-PT')}€</span></div>` : '';
                            }).join('')}
                        </div>
                    </div>`;
                document.getElementById('header-actions').innerHTML = `<button onclick="openModal()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-black text-xs uppercase">+ Novo</button>`;
            } else {
                renderList();
            }
            lucide.createIcons();
        }

        function renderList() {
            const list = currentView === 'entradas' ? db.entradas : db.despesas;
            const sorted = [...list].sort((a,b) => new Date(b.data) - new Date(a.data));
            document.getElementById('content').innerHTML = sorted.map(m => `
                <div class="bg-white p-5 rounded-2xl shadow-sm mb-3 flex justify-between items-center border-l-4 ${currentView==='entradas'?'border-emerald-500':'border-red-500'}">
                    <div><p class="font-black italic uppercase text-sm">${m.desc}</p><p class="text-[10px] text-slate-400 font-bold">${m.data} ${m.cat ? '• '+m.cat : ''}</p></div>
                    <div class="flex items-center gap-4">
                        <p class="font-black text-lg">${m.valor.toLocaleString('pt-PT')}€</p>
                        <button onclick="deleteEntry('${m.id}')" class="text-slate-200 hover:text-red-500"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                </div>`).join('');
            document.getElementById('header-actions').innerHTML = `<button onclick="openModal()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-black text-xs uppercase">+ Adicionar</button>`;
        }

        function openModal() {
            document.getElementById('modal-entry').style.display = 'flex';
            document.getElementById('form-cat').innerHTML = db.categorias.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('form-date').valueAsDate = new Date();
        }
        function closeModal() { document.getElementById('modal-entry').style.display = 'none'; }

        async function saveEntry() {
            const val = parseFloat(document.getElementById('form-value').value), desc = document.getElementById('form-desc').value, date = document.getElementById('form-date').value;
            if(!val || !desc) return alert("Preencha os dados!");
            
            const entry = { id: Date.now().toString(), data: date, valor: val, desc: desc };
            if(currentView === 'entradas') db.entradas.push(entry); 
            else { entry.cat = document.getElementById('form-cat').value; db.despesas.push(entry); }
            
            closeModal(); await saveToDropbox(); render();
        }

        async function deleteEntry(id) {
            if(!confirm("Apagar registo?")) return;
            db.entradas = db.entradas.filter(e => e.id !== id);
            db.despesas = db.despesas.filter(d => d.id !== id);
            await saveToDropbox(); render();
        }

        lucide.createIcons();
    </script>
</body>
</html>
